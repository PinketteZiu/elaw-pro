<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message envoyé — ELAW PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --noir:     #0E0B16;
    --noir-sec: #14111C;
    --or:       #B6BC5A;
    --or-light: #D4D97A;
    --gris:     #E5E5E5;
    --gris-mut: #A0A0A0;
    --border:   rgba(182, 188, 90, 0.18);
    --font:     'Poppins', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--noir);
    color: var(--gris);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    max-width: 520px;
    width: 100%;
    text-align: center;
    border: 1px solid var(--border);
    padding: 4rem 3rem;
    background: #14111C;
  }

  .icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 2rem;
    border: 1px solid #B79A6C;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon svg {
    width: 24px;
    height: 24px;
    stroke: #B79A6C;
  }

  .logo {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #B79A6C;
    margin-bottom: 2.5rem;
    display: block;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: #B79A6C;
    margin-bottom: 1rem;
  }

  p {
    font-size: 10pt;
    font-weight: 300;
    color: whitesmoke;
    line-height: 1.8;
    margin-bottom: 2.5rem;
  }

  .btn {
    display: inline-block;
    padding: 0.85rem 2rem;
    font-family: var(--font);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    background: #B79A6C;
    color: #0E0B16;
    transition: background 0.25s;
  }

  .btn:hover { background: var(--or-light); }

  .footer-note {
    margin-top: 3rem;
    font-size: 8pt;
    color: #b79a6c93;
  }
</style>
</head>
<body>

  <div class="card">
    <!-- <span class="logo">ELAW PRO</span> -->
    <img id="logo" src="images/Logo ElawPro.png" alt="ElawPro" width="200">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1>Message envoyé</h1>
    <p>Merci pour votre message.<br>Je vous répondrai dans les plus brefs délais.</p>

    <a href="index.html" class="btn">Retour au site</a>

    <p class="footer-note">© 2026 ELAW PRO — Tous droits réservés | Créé avec ❤️ par JV</p>
  </div>

</body>
</html>
